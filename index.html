
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>neurAlly</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              mirror: {
                bg: 'var(--mirror-bg)',
                panel: 'var(--mirror-panel)',
                accent: 'var(--mirror-accent)',
                text: 'var(--mirror-text)',
                subtext: 'var(--mirror-subtext)',
                border: 'var(--mirror-border)'
              }
            },
            animation: {
              'blob': 'blob 10s infinite',
              'float-slow': 'float 8s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 3s linear infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '200% 0' },
                '100%': { backgroundPosition: '-200% 0' }
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* DARK MODE (Liquid Obsidian) */
        --mirror-bg: #000000;
        --mirror-panel: rgba(22, 22, 24, 0.4); 
        --mirror-accent: #3b82f6;
        --mirror-text: #ffffff;
        --mirror-subtext: rgba(235, 235, 245, 0.65);
        --mirror-border: rgba(255, 255, 255, 0.1);
        
        /* Glass Variables - Dark */
        --glass-matte-bg: linear-gradient(145deg, rgba(30, 30, 35, 0.7) 0%, rgba(20, 20, 22, 0.6) 100%);
        --glass-gloss-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
        
        --glass-border-light: rgba(255, 255, 255, 0.15);
        --glass-highlight: rgba(255, 255, 255, 0.2);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        
        --dock-bg: rgba(20, 20, 25, 0.5);
        --dock-border: rgba(255, 255, 255, 0.12);
        --dock-highlight: rgba(255, 255, 255, 0.15);
        --dock-shadow: rgba(0, 0, 0, 0.6);
        
        --hover-bg: rgba(255, 255, 255, 0.08);
        --input-bg: transparent;

        --orb-1: rgba(59, 130, 246, 0.2);
        --orb-2: rgba(236, 72, 153, 0.15);
        --orb-3: rgba(168, 85, 247, 0.15);
        
        --fluid-gradient: linear-gradient(135deg, #60a5fa 0%, #a855f7 50%, #ec4899 100%);
      }

      [data-theme='light'] {
        /* LIGHT MODE (Liquid Ice) */
        --mirror-bg: #f2f2f7;
        --mirror-panel: rgba(255, 255, 255, 0.6);
        --mirror-accent: #007aff;
        --mirror-text: #1d1d1f;
        --mirror-subtext: rgba(60, 60, 67, 0.7);
        --mirror-border: rgba(0, 0, 0, 0.06);
        
        /* Glass Variables - Light */
        --glass-matte-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0.6) 100%);
        --glass-gloss-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.3) 100%);

        --glass-border-light: rgba(255, 255, 255, 0.6); 
        --glass-highlight: rgba(255, 255, 255, 0.9);
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.06);

        --dock-bg: rgba(255, 255, 255, 0.75);
        --dock-border: rgba(255, 255, 255, 0.4);
        --dock-highlight: rgba(255, 255, 255, 0.95);
        --dock-shadow: rgba(0, 0, 0, 0.1);
        
        --hover-bg: rgba(0, 0, 0, 0.04);
        --input-bg: rgba(0, 0, 0, 0.02);

        --orb-1: rgba(59, 130, 246, 0.1);
        --orb-2: rgba(236, 72, 153, 0.08);
        --orb-3: rgba(168, 85, 247, 0.08);

        --fluid-gradient: linear-gradient(135deg, #007aff 0%, #5856d6 50%, #af52de 100%);
      }

      body {
        background-color: var(--mirror-bg);
        color: var(--mirror-text);
        overflow: hidden;
        transition: background-color 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.6s ease;
      }

      /* Animated Mesh Gradient Background */
      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: 
          radial-gradient(circle at 50% 50%, var(--orb-1), transparent 50%),
          radial-gradient(circle at 10% 20%, var(--orb-2), transparent 40%),
          radial-gradient(circle at 90% 80%, var(--orb-3), transparent 40%);
        filter: blur(90px);
        z-index: -1;
        animation: blob 25s infinite alternate ease-in-out;
        transition: background 0.6s ease;
      }
      
      .mirror-gradient-text {
        background: var(--fluid-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
        animation: shimmer 5s linear infinite;
      }

      /* LIQUID GLASS ENGINE v2 */
      
      /* Base Frosted Glass (Matte) */
      .glass-matte {
        background: var(--glass-matte-bg);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid var(--mirror-border);
        box-shadow: 
          var(--glass-shadow),
          inset 0 1px 0 0 var(--glass-highlight); /* Specular Top Highlight */
        transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      /* High Gloss Glass - The "Liquid" Look */
      .glass-gloss {
        background: var(--glass-gloss-bg);
        backdrop-filter: blur(24px) saturate(160%);
        -webkit-backdrop-filter: blur(24px) saturate(160%);
        border: 1px solid var(--glass-border-light);
        box-shadow: 
          var(--glass-shadow),
          inset 0 1px 0 0 rgba(255, 255, 255, 0.25),
          inset 0 0 0 1px rgba(255, 255, 255, 0.05); /* Inner Ring */
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Specialized Dock Glass */
      .glass-dock {
        background: var(--dock-bg);
        backdrop-filter: blur(50px) saturate(200%);
        -webkit-backdrop-filter: blur(50px) saturate(200%);
        border: 1px solid var(--dock-border);
        box-shadow: 
          0 20px 50px -12px var(--dock-shadow),
          inset 0 1px 0 0 var(--dock-highlight),
          inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
      }
      
      /* Interaction States */
      .glass-gloss:hover, .glass-matte:hover {
        box-shadow: 
          0 12px 40px -8px var(--glass-shadow),
          inset 0 1px 0 0 rgba(255, 255, 255, 0.4);
        border-color: rgba(255, 255, 255, 0.25);
      }
      
      .glass-dock:hover {
        box-shadow: 
          0 25px 60px -10px var(--dock-shadow),
          inset 0 1px 0 0 var(--dock-highlight);
      }

      .squircle {
        border-radius: 24px; 
        border-radius: 1.5rem; 
      }
      
      .hover-surface {
        transition: background-color 0.2s ease, transform 0.2s ease;
      }
      .hover-surface:hover {
        background-color: var(--hover-bg);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(128, 128, 128, 0.2);
        border-radius: 10px;
        border: 1px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: var(--mirror-subtext);
      }
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @media print {
        @page { margin: 1cm; size: auto; }
        body { background: white !important; color: black !important; overflow: visible !important; }
        body::before { display: none !important; }
        aside, header, .glass-dock, .no-print { display: none !important; }
        main { padding: 0 !important; overflow: visible !important; }
        .glass-matte, .glass-gloss, .glass-dock { 
          background: none !important; 
          box-shadow: none !important; 
          border: 1px solid #ddd !important;
          color: black !important;
          backdrop-filter: none !important;
        }
        .text-mirror-text { color: black !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react": "https://esm.sh/react@^19.2.3",
    "react/jsx-runtime": "https://esm.sh/react@^19.2.3/jsx-runtime",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "react-dom": "https://esm.sh/react-dom@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
